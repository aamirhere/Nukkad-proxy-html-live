<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NukkadTales · Related Products</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--cream:#fdf6f0;--brown:#3d2b1a;--orange:#c47a45;--muted:#8c7b6e;--border:#e8d5c0;--sand:#f5ede0;--green:#2d7d46;--red:#c0392b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--brown);min-height:100vh;}
  header{background:var(--brown);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  header h1{font-family:'Poppins',sans-serif;font-weight:900;font-size:16px;color:#fff;}
  .toolbar{background:var(--sand);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:45px;z-index:99;}
  .toolbar input[type=text]{flex:1;min-width:180px;border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:12px;background:#fff;color:var(--brown);}
  .toolbar input[type=text]:focus{outline:none;border-color:var(--orange);}
  .btn{border:none;border-radius:8px;padding:7px 13px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s;}
  .btn:hover{opacity:.85;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-primary{background:var(--orange);color:#fff;}
  .btn-green{background:var(--green);color:#fff;}
  .btn-ghost{background:rgba(61,43,26,.08);color:var(--brown);}
  .btn-blue{background:#2563eb;color:#fff;}
  .btn-sm{padding:4px 10px;font-size:10px;}
  .stats{display:flex;gap:8px;padding:12px 20px;flex-wrap:wrap;}
  .stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 14px;}
  .stat-n{font-family:'Poppins',sans-serif;font-weight:900;font-size:22px;color:var(--brown);}
  .stat-l{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:1px;}
  .list-meta{padding:6px 20px 4px;font-size:11px;color:var(--muted);font-weight:600;}
  .products-wrap{padding:12px 20px 40px;}
  .product-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;transition:border-color .15s;}
  .product-card.matched{border-color:#b8dfc8;}
  .product-card.loading{opacity:.6;pointer-events:none;}
  .product-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--sand);border:1px solid var(--border);}
  .product-thumb-placeholder{width:52px;height:52px;border-radius:8px;flex-shrink:0;background:var(--sand);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--border);}
  .product-title{font-weight:700;font-size:13px;margin-bottom:2px;}
  .product-handle{font-size:9px;color:var(--muted);font-family:monospace;}
  .badge{font-size:9px;font-weight:700;border-radius:20px;padding:2px 8px;text-transform:uppercase;display:inline-block;}
  .badge-matched{background:#e8f5ec;color:var(--green);}
  .badge-pending{background:#fff3e0;color:var(--orange);}
  .related-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
  .related-chip{font-family:monospace;font-size:9px;background:#f0f4ff;border:1px solid #c7d7fb;color:#2563eb;border-radius:6px;padding:2px 7px;white-space:nowrap;}
  .matched-at{font-size:9px;color:var(--muted);margin-top:5px;}
  .card-row{display:flex;align-items:flex-start;gap:10px;}
  .card-body{flex:1;min-width:0;}
  .card-actions{display:flex;gap:5px;align-items:center;flex-shrink:0;}
  .empty{text-align:center;padding:48px 20px;color:var(--muted);}
  .empty h3{font-family:'Poppins',sans-serif;font-weight:700;margin-bottom:6px;color:var(--brown);}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--brown);color:#fff;padding:8px 18px;border-radius:20px;font-size:11px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;}
  .toast.show{opacity:1;}
  .toast.error{background:#c0392b;}
  .spinner-mini{width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;display:inline-block;}
  .spinner-mini.dark{border-color:var(--border);border-top-color:var(--orange);}
  @keyframes spin{to{transform:rotate(360deg);}}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);animation:pulse 1.4s ease-in-out infinite;display:inline-block;margin-right:5px;flex-shrink:0;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
</style>
</head>
<body>

<!-- ── Auth Gate ─────────────────────────────────── -->
<div id="authGate" style="display:flex;position:fixed;inset:0;background:linear-gradient(135deg,#fdf6f0,#f5e6d0);z-index:99999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:20px;padding:40px 32px;width:340px;box-shadow:0 20px 60px rgba(139,69,19,.15);text-align:center;">
    <div style="font-family:'Poppins',sans-serif;font-weight:900;font-size:22px;color:#6b3a1f;margin-bottom:4px;">🔗 Related Products</div>
    <div style="font-size:12px;color:#a07a52;margin-bottom:28px;">NukkadTales internal tool</div>
    <input id="authInput" type="password" placeholder="Enter password"
      style="width:100%;border:1.5px solid #e5d0b8;border-radius:10px;padding:12px 14px;font-size:14px;font-family:'DM Sans',sans-serif;box-sizing:border-box;outline:none;margin-bottom:10px;"
      onkeydown="if(event.key==='Enter')checkAuth()">
    <div id="authErr" style="font-size:11px;color:#e53;min-height:16px;margin-bottom:10px;"></div>
    <button id="authBtn" onclick="checkAuth()"
      style="width:100%;background:#8B4513;color:#fff;border:none;border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer;">
      Enter
    </button>
  </div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────
const PROXY_BASE    = 'https://cozy-dieffenbachia-95eb4b.netlify.app/.netlify/functions';
const RELATE_URL    = PROXY_BASE + '/nt-relate-products';
const CATALOG_URL   = PROXY_BASE + '/nt-catalog-approve';
let NT_TOKEN        = sessionStorage.getItem('nt_admin_token') || '';

// State
let allProducts  = [];   // from catalog (approved list)
let matchedData  = {};   // { handle: { handle, title, related: [...], matched_at } }
let isFetching   = false;
let isPushing    = false;
let searchQ      = '';

// ── Auth ─────────────────────────────────────────────────────
async function checkAuth() {
  const val   = document.getElementById('authInput').value.trim();
  if (!val) return;
  const errEl = document.getElementById('authErr');
  const btn   = document.getElementById('authBtn');
  errEl.textContent = '';
  btn.textContent   = 'Checking…';
  btn.disabled      = true;
  try {
    const res  = await fetch(`${PROXY_BASE}/nt-admin-token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: val })
    });
    const data = await res.json();
    if (!res.ok || !data.token) {
      errEl.textContent = data.error || 'Wrong password';
      btn.textContent   = 'Enter';
      btn.disabled      = false;
      return;
    }
    NT_TOKEN = data.token;
    sessionStorage.setItem('nt_admin_token', NT_TOKEN);
    document.getElementById('authGate').style.display = 'none';
    init();
  } catch(e) {
    errEl.textContent = 'Network error — try again';
    btn.textContent   = 'Enter';
    btn.disabled      = false;
  }
}

function authFetch(url, opts = {}) {
  opts.headers = opts.headers || {};
  opts.headers['Authorization'] = 'Bearer ' + NT_TOKEN;
  return fetch(url, opts);
}

function api(url, body) {
  return authFetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(r => r.json());
}

(function() {
  if (NT_TOKEN) {
    document.getElementById('authGate').style.display = 'none';
  }
})();
</script>

<!-- ── Header ────────────────────────────────────────────── -->
<header>
  <h1>🔗 Related Products</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="headerStatus" style="font-size:10px;color:rgba(255,255,255,.55);font-weight:500;">Loading…</span>
  </div>
</header>

<!-- ── Toolbar ───────────────────────────────────────────── -->
<div class="toolbar">
  <button class="btn btn-primary"  id="btnClassify"    onclick="classifyAll(false)" title="Classify only unclassified products">🏷 Classify Pending</button>
  <button class="btn btn-ghost"    id="btnReclassify"  onclick="classifyAll(true)"  style="border:1.5px solid var(--orange);color:var(--orange);" title="Re-classify ALL products (adds cultural_register to existing)">↺ Re-classify All</button>
  <button class="btn btn-primary"  id="btnFetch"       onclick="fetchAll(false)" style="background:#7c3aed;" title="Step 2: Match products using taxonomy. Fast — no AI needed.">⚡ Match Pending</button>
  <button class="btn btn-ghost"    id="btnRefetchAll"  onclick="fetchAll(true)"  style="border:1.5px solid #7c3aed;color:#7c3aed;">↺ Re-match All</button>
  <button class="btn btn-green"    id="btnPush"        onclick="pushAll()">📤 Send to Shopify</button>
  <button class="btn btn-ghost"    id="btnReload"      onclick="init()">↻ Reload</button>
  <input type="text" id="searchInp" placeholder="Search by title or handle…" oninput="onSearch()">
</div>

<!-- ── Activity bar ───────────────────────────────────────── -->
<div id="activityBar" style="display:none;background:linear-gradient(135deg,#fff8f0,#fdf6f0);border-bottom:1px solid var(--border);padding:10px 20px;position:sticky;top:83px;z-index:98;box-shadow:0 2px 8px rgba(61,43,26,.08);">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="spinner-mini dark"></div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:11px;font-weight:700;color:var(--brown);" id="actTitle">Working…</div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="actMsg"></div>
    </div>
    <div style="min-width:120px;text-align:right;">
      <div style="font-size:10px;font-weight:700;color:var(--orange);margin-bottom:4px;" id="actCount"></div>
      <div style="background:#f5ede0;border-radius:8px;overflow:hidden;height:5px;">
        <div id="actProgress" style="background:var(--orange);height:100%;width:0%;transition:width .3s;"></div>
      </div>
    </div>
    <button onclick="cancelFetch()" id="btnCancel" style="background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;">✕ Stop</button>
  </div>
</div>

<!-- ── Stats ─────────────────────────────────────────────── -->
<div class="stats" id="statsRow">
  <div class="stat"><div class="stat-n" id="statTotal">—</div><div class="stat-l">Total</div></div>
  <div class="stat"><div class="stat-n" id="statClassified" style="color:#7c3aed">—</div><div class="stat-l">Classified</div></div>
  <div class="stat"><div class="stat-n" id="statMatched" style="color:var(--green)">—</div><div class="stat-l">Matched</div></div>
  <div class="stat"><div class="stat-n" id="statPending" style="color:var(--orange)">—</div><div class="stat-l">Pending</div></div>
</div>

<div class="list-meta" id="listMeta"></div>
<div class="products-wrap" id="productsWrap">
  <div class="empty"><div class="spinner-mini dark" style="margin:0 auto 10px;"></div><p>Loading catalogue…</p></div>
</div>

<!-- ── Toast ─────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
// ── Toast ─────────────────────────────────────────────────
let _toastTimer;
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show' + (isErr ? ' error' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
}

// ── Stats & status ────────────────────────────────────────
let taxonomyData = {}; // loaded alongside matchedData

function updateStats() {
  const total      = allProducts.length;
  const classified = allProducts.filter(p => taxonomyData[(p.handle || p.h)]).length;
  const matched    = allProducts.filter(p => matchedData[(p.handle || p.h)]).length;
  document.getElementById('statTotal').textContent      = total;
  document.getElementById('statClassified').textContent = classified;
  document.getElementById('statMatched').textContent    = matched;
  document.getElementById('statPending').textContent    = total - matched;
  document.getElementById('headerStatus').textContent   = `${matched}/${total} matched`;
}

function setHeaderBusy(msg) {
  document.getElementById('headerStatus').innerHTML =
    `<span class="status-dot"></span><span style="color:rgba(255,255,255,.75);font-size:10px;">${esc(msg)}</span>`;
}

function clearHeaderBusy() { updateStats(); }

function updateCardInPlace(p) {
  const handle = p.handle || p.h;
  const cardId = 'card-' + handle.replace(/[^a-z0-9]/g, '-');
  const el = document.getElementById(cardId);
  if (!el) return;
  el.outerHTML = cardHTML(p);
}

// ── Init ─────────────────────────────────────────────────
async function init() {
  document.getElementById('productsWrap').innerHTML =
    '<div class="empty"><div class="spinner-mini dark" style="margin:0 auto 10px;"></div><p>Loading…</p></div>';
  try {
    const [catRes, relRes] = await Promise.all([
      api(CATALOG_URL, { action: 'load_approved' }),
      api(RELATE_URL,  { action: 'load' })
    ]);
    allProducts  = (catRes.approved || []).map(p => ({ ...p, handle: p.handle || p.h, title: p.title || p.t }));
    matchedData  = relRes.data || {};
    taxonomyData = relRes.taxonomy || {};
    updateStats();
    render();
  } catch(e) {
    document.getElementById('productsWrap').innerHTML =
      `<div class="empty"><h3>Error</h3><p>${e.message}</p></div>`;
    toast('Failed to load: ' + e.message, true);
  }
}

window.onload = () => { if (NT_TOKEN) init(); };

// ── Search ───────────────────────────────────────────────
function onSearch() {
  searchQ = document.getElementById('searchInp').value.toLowerCase();
  render();
}

// ── Render ───────────────────────────────────────────────
function render() {
  const list = searchQ
    ? allProducts.filter(p => (p.title || '').toLowerCase().includes(searchQ) || (p.handle || '').includes(searchQ))
    : allProducts;

  document.getElementById('listMeta').textContent = `${list.length} products`;

  if (!list.length) {
    document.getElementById('productsWrap').innerHTML =
      '<div class="empty"><h3>Nothing here</h3><p>No products match your search.</p></div>';
    return;
  }

  document.getElementById('productsWrap').innerHTML = list.map(p => cardHTML(p)).join('');
}

function cardHTML(p) {
  const handle  = p.handle || p.h || '';
  const title   = p.title  || p.t || handle;
  const matched = matchedData[handle];
  const cardId  = 'card-' + handle.replace(/[^a-z0-9]/g, '-');

  const badgeHTML = matched
    ? `<span class="badge badge-matched">✓ matched</span>`
    : `<span class="badge badge-pending">pending</span>`;

  const tax = taxonomyData[handle];
  const taxHTML = tax ? `<div class="related-chips" style="margin-top:4px;">
    ${(tax.professions||[]).map(n => `<span class="related-chip" style="background:#f0fdf4;border-color:#86efac;color:#15803d;">${n.replace('prof.','')}</span>`).join('')}
    ${(tax.vibes||[]).map(n => `<span class="related-chip" style="background:#fdf4ff;border-color:#e9d5ff;color:#7c3aed;">${n.replace('vibe.','')}</span>`).join('')}
    ${(tax.occasions||[]).map(n => `<span class="related-chip" style="background:#fff7ed;border-color:#fed7aa;color:#c2410c;">${n.replace('occ.','')}</span>`).join('')}
  </div>` : '';

  const chipsHTML = matched
    ? `<div class="related-chips">${(matched.related || []).map(h =>
        `<span class="related-chip">${h}</span>`).join('')}</div>`
    : '';

  const timeHTML = matched && matched.matched_at
    ? `<div class="matched-at">Matched ${fmtDate(matched.matched_at)}</div>`
    : '';

  const pushBtn = matched
    ? `<button class="btn btn-blue btn-sm" onclick="pushOne('${handle}')" id="push-${handle}">↑ Push</button>`
    : '';

  const img = p.shopifyImage || p.featuredImage || null;
  const thumbHTML = img
    ? `<img class="product-thumb" src="${esc(img)}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="product-thumb-placeholder">🪵</div>`;

  return `
  <div class="product-card ${matched ? 'matched' : ''}" id="${cardId}">
    <div class="card-row" onclick="openStudio('${handle}')" style="cursor:pointer;">
      ${thumbHTML}
      <div class="card-body">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
          <span class="product-title">${esc(title)}</span>
          ${badgeHTML}
        </div>
        <div class="product-handle">${esc(handle)}</div>
        ${taxHTML}
        ${chipsHTML}
        ${timeHTML}
      </div>
      <div class="card-actions">
        <button class="btn btn-ghost btn-sm" onclick="fetchOne('${handle}')" id="refetch-${handle}">↺ Re-fetch</button>
        ${pushBtn}
        <button class="btn btn-sm" style="background:#7c3aed;color:#fff;" onclick="event.stopPropagation();openStudio('${handle}')">🎨</button>
      </div>
    </div>
    <div id="studio-${handle}" style="display:none;"></div>
  </div>`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleString('en-IN', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit', hour12:true });
  } catch { return iso; }
}

// ── Classify all — Step 1, one product at a time ─────────
let _classifyCancelled = false;
let isClassifying = false;

async function classifyAll(reclassifyAll = false) {
  if (isClassifying) return;
  // Load existing taxonomy to know which are already done
  let existingTax = {};
  try {
    const tx = await api(RELATE_URL, { action: 'load_taxonomy' });
    existingTax = tx.data || {};
  } catch(e) {}

  // When re-classifying all, include everything (ignores existing)
  // When classifying pending, skip already-classified that already have cultural_register
  const pending = reclassifyAll
    ? allProducts
    : allProducts.filter(p => {
        const t = existingTax[p.handle || p.h];
        return !t || !t.cultural_register; // redo if missing cultural_register
      });

  if (!pending.length) { toast('All products already classified! Run ⚡ Match now.'); return; }

  isClassifying = true;
  _classifyCancelled = false;
  const btn = document.getElementById(reclassifyAll ? 'btnReclassify' : 'btnClassify');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-mini' + (reclassifyAll ? ' dark' : '') + '"></span> Classifying…';
  setHeaderBusy('Classifying products with AI…');

  let done = 0, errors = 0;
  const total = pending.length;
  showActivityBar('🏷 Step 1 — Classifying products', `Starting… (${total} to classify)`, 0, total);

  // Batch of 2 — keeps Gemini calls under Netlify's 10s timeout
  const BATCH = 2;
  for (let i = 0; i < pending.length; i += BATCH) {
    if (_classifyCancelled) break;
    const batch = pending.slice(i, i + BATCH);
    const handles = batch.map(p => p.handle || p.h);
    const batchTitles = batch.map(p => p.title || p.t || p.handle || p.h).join(' · ');
    showActivityBar(
      '🏷 Classifying products',
      `${batchTitles}  · ${total - done} remaining`,
      done, total
    );
    try {
      const res = await api(RELATE_URL, { action: 'classify', handles });
      if (res.ok) done += Object.keys(res.results || {}).length;
      else errors++;
    } catch(e) { errors++; }
  }

  isClassifying = false;
  btn.disabled = false;
  btn.innerHTML = reclassifyAll ? '↺ Re-classify All' : '🏷 Classify Pending';
  clearHeaderBusy();
  hideActivityBar();
  // Refresh taxonomy data and re-render so tags appear on cards
  await reload();
  toast(_classifyCancelled
    ? `Stopped — ${done} classified`
    : `✓ Classification done — ${done} products tagged. Now run ⚡ Match.`
  , errors > 0);
}

// ── Fetch all — one product at a time with live progress ──
let _fetchCancelled = false;

function cancelFetch() {
  _fetchCancelled = true;
  document.getElementById('btnCancel').textContent = 'Stopping…';
}

function showActivityBar(title, msg, done, total) {
  document.getElementById('activityBar').style.display = 'block';
  document.getElementById('actTitle').textContent = title;
  document.getElementById('actMsg').textContent   = msg;
  document.getElementById('actCount').textContent = total ? `${done} / ${total}` : '';
  document.getElementById('actProgress').style.width = total ? Math.round(done/total*100)+'%' : '0%';
}

function hideActivityBar() {
  document.getElementById('activityBar').style.display = 'none';
}

async function fetchAll(refetchAll = false) {
  if (isFetching) return;
  const pending = refetchAll ? allProducts : allProducts.filter(p => !matchedData[p.handle || p.h]);
  if (!pending.length) { toast('All products already matched!'); return; }

  isFetching = true;
  _fetchCancelled = false;
  const btn = document.getElementById(refetchAll ? 'btnRefetchAll' : 'btnFetch');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-mini' + (refetchAll ? ' dark' : '') + '"></span> ' + (refetchAll ? 'Re-fetching…' : 'Fetching…');
  setHeaderBusy('Fetching AI matches in background…');

  let done = 0, errors = 0;
  const total = pending.length;

  showActivityBar('Fetching AI matches', `Starting… (${total} pending products)`, 0, total);

  for (const p of pending) {
    if (_fetchCancelled) break;
    const handle = p.handle || p.h;
    const title  = p.title  || p.t || handle;
    showActivityBar(
      'Fetching AI matches — running in background',
      `⚡ ${title}  (${errors ? errors+' errors · ' : ''}${total - done} remaining)`,
      done, total
    );
    try {
      const res = await api(RELATE_URL, { action: 'fetch_related', handles: [handle] });
      if (res.ok) {
        // Merge result into local state and update that card immediately
        const relRes = await api(RELATE_URL, { action: 'load' });
        matchedData = relRes.data || {};
        updateCardInPlace(p);
        updateStats();
      } else {
        errors++;
      }
    } catch(e) {
      errors++;
    }
    done++;
  }

  isFetching = false;
  btn.disabled = false;
  btn.innerHTML = refetchAll ? '↺ Re-fetch All' : '⚡ Fetch Pending';
  clearHeaderBusy();
  hideActivityBar();
  toast(_fetchCancelled
    ? `Stopped after ${done} products (${errors} errors)`
    : `✓ Done — ${done - errors} matched, ${errors} errors`
  , errors > 0);
  render();
}

// ── Fetch one ────────────────────────────────────────────
async function fetchOne(handle) {
  const btn = document.getElementById('refetch-' + handle);
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-mini dark"></span>'; }
  const cardEl = document.getElementById('card-' + handle.replace(/[^a-z0-9]/g, '-'));
  if (cardEl) cardEl.classList.add('loading');
  try {
    const res = await api(RELATE_URL, { action: 'fetch_related', handles: [handle] });
    if (res.ok) {
      toast('✓ Matched ' + handle);
      await reload();
    } else {
      toast('Failed: ' + (res.error || ''), true);
    }
  } catch(e) {
    toast('Error: ' + e.message, true);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '↺ Re-fetch'; }
    if (cardEl) cardEl.classList.remove('loading');
  }
}

// ── Push all ─────────────────────────────────────────────
async function pushAll() {
  if (isPushing) return;
  isPushing = true;
  const btn = document.getElementById('btnPush');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-mini"></span> Pushing…';
  try {
    const res = await api(RELATE_URL, { action: 'push_related' });
    if (res.ok) {
      toast(`✓ Pushed ${res.pushed} products to Shopify`);
      if (res.errors && res.errors.length) toast(`${res.errors.length} errors`, true);
    } else {
      toast('Push failed: ' + (res.error || ''), true);
    }
  } catch(e) {
    toast('Error: ' + e.message, true);
  } finally {
    isPushing = false;
    btn.disabled = false;
    btn.innerHTML = '📤 Send to Shopify';
  }
}

    t.style.borderBottom = active ? '2px solid #7c3aed' : '2px solid transparent';

    t.style.fontWeight = active ? '700' : '400';
  });

  const active = document.getElementById(`stabcontent-${parentHandle}-${tabHandle}`);
  if (active) active.style.display = 'block';

  studioState[parentHandle].activeTab = tabHandle;
}

function toggleTax(handle) {

function regenPrompt(handle) {
  const p = allProducts.find(x=>(x.handle||x.h)===handle);
  if (!p) return;
  const quote = p.title || p.t || p.tagline || p.tl || '';
  const scene = (studioState[handle]||{}).scene || 'desk';

    `Product lifestyle ad photography. A handmade wooden piece with the quote '${quote}' sits as the clear hero. ${buildStudioPrompt(quote, scene, tax)} Shot from a slightly lower angle, emphasising the product's texture and depth.`,
    `Indian gifting brand ad. The wooden quote piece '${quote}' — sharp, realistic, engraved text clearly visible — is the first thing the eye finds. ${buildStudioPrompt(quote, scene, tax)} Golden hour light. Bokeh background.`,
    buildStudioPrompt(quote, scene, tax) + ` Shallow depth of field. Close crop on product. Colour palette: warm terracottas and creams.`,

function previewRef(handle, input) {

async function loadPersonalities(handle) {

  const p = allProducts.find(x=>(x.handle||x.h)===handle);
  const quote = p?.title || p?.t || p?.tagline || '';
  try {
    const res = await api(AD_URL, { action:'suggest_personalities', quote, taxonomy: taxonomyData[handle]||{} });

      if (!studioState[handle]) studioState[handle] = { scene:'desk', images:[], taglines:[] };
      studioState[handle].personalities = res.personalities;
      renderPersonalities(handle, res.personalities);

  document.querySelectorAll(`[id^="spersona-${handle}-"]`).forEach((b, i) => {

async function applyDirection(handle) {
  const dirEl = document.getElementById('stdir-' + handle);
  const direction = dirEl?.value?.trim();
  if (!direction) return;
  const ta = document.getElementById('stprompt-' + handle);
  if (!ta) return;
  const currentPrompt = ta.value;
  const btn = dirEl?.nextElementSibling;
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const res = await api(AD_URL, { action: 'refine_prompt', current_prompt: currentPrompt, direction });
    if (res.ok && res.prompt) {
      ta.value = res.prompt;
      if (dirEl) dirEl.value = '';
      toast('✓ Prompt updated');
    } else { toast(res.error || 'Failed', true); }
  } catch(e) { toast('Error: ' + e.message, true); }
  finally { if (btn) { btn.disabled = false; btn.textContent = '↵ Apply'; } }
}

async function writeGulPrompt(handle) {
  const p = allProducts.find(x=>(x.handle||x.h)===handle);
  if (!p) return;
  const brief = document.getElementById('stbrief-' + handle)?.value || '';
  const refInput = document.getElementById('stref-' + handle);
  const respEl = document.getElementById('stgulresp-' + handle);
  const btn = document.querySelector(`#stabcontent-${handle} button[onclick*="writeGulPrompt"]`) ||
              document.querySelector(`[onclick="writeGulPrompt('${handle}')"]`);
  if (btn) { btn.disabled = true; btn.textContent = '✍ Writing…'; }
  if (respEl) { respEl.style.display = 'block'; respEl.textContent = 'Gul is thinking…'; }

  let ref_image_b64 = null;
  if (refInput?.files?.[0]) {
    ref_image_b64 = await new Promise(res => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.readAsDataURL(refInput.files[0]);
    });
  }

  try {
    const res = await api(AD_URL, {
      action: 'write_prompt',
      handle,
      product_title: p.title || handle,
      quote: p.title || p.t || p.tagline || p.tl || '',
      taxonomy: taxonomyData[handle] || {},
      user_brief: brief,
      ref_image_b64,
    });
    if (res.ok && res.prompt) {
      const ta = document.getElementById('stprompt-' + handle);
      if (ta) ta.value = res.prompt;
      if (respEl) { respEl.textContent = '✓ Prompt written! You can edit it above, then Copy or Generate.'; }
      toast('✓ Gul wrote your prompt');
    } else {
      if (respEl) respEl.textContent = res.error || 'Error';
    }
  } catch(e) {
    if (respEl) respEl.textContent = 'Error: ' + e.message;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '✍ Write Prompt'; }
  }
}

function buildStudioPrompt(quote, scene, tax) {

    'prof.teacher':      'A neat stack of books, a succulent in a ceramic pot, and a black coffee in a minimal mug.',
    'prof.writer':       'An open notebook with a fountain pen, a warm reading lamp, and two worn paperbacks stacked beside.',
    'prof.doctor':       'A stethoscope coiled neatly, a small succulent, and soft diffused morning light on a clean desk.',
    'prof.engineer':     'Mechanical pencils, a sleek closed laptop, a desk organiser, warm side lamp casting long shadows.',
    'prof.ca':           'A leather-bound planner, a quality pen, a black coffee, clean white desk surface.',
    'prof.lawyer':       'A leather journal, a fountain pen, one law book spine visible, soft desk lamp.',
    'prof.creative':     'Watercolour swatches, a sketch pad, a mug of matcha, natural window light.',
    'prof.homemaker':    'Fresh flowers in a ceramic vase, a scented candle, warm afternoon light through sheer curtains.',
    'prof.entrepreneur': 'A slim MacBook, a white coffee cup, a succulent, clean minimal desk. City window in soft focus background.',
    'prof.spiritual':    'A small brass diya, fresh marigolds, a sandalwood incense holder, warm golden light.',
  };

  const placement = sceneMap[scene] || sceneMap.desk;
  const profKey = (tax.professions||[])[0] || '';
  const props = profProps[profKey] || 'A ceramic coffee mug, a small succulent, and a minimal desk organiser nearby. Soft warm light.';

  return `Product lifestyle photography. Hero: handmade 3D wooden quote piece reading "${quote}" — keep it sharp, realistic, exactly as it looks. No distortion to the text or shape. Placed ${placement}. ${props} Soft editorial lighting, warm tones. Clean contemporary aesthetic — modern urban home, not traditional or ancient. Aspirational and personal. The product is the undeniable hero of the frame. High-converting ad quality, shallow depth of field.`;
}

function setScene(handle, scene) {
  if (!studioState[handle]) studioState[handle] = { scene, images:[], taglines:[] };
  studioState[handle].scene = scene;
  SCENES.forEach(sc => {
    const btn = document.getElementById(`sc-${handle}-${sc}`);
    if (!btn) return;
    const active = sc === scene;
    btn.style.borderColor = active ? 'var(--orange)' : 'var(--border)';
    btn.style.background  = active ? 'var(--orange)' : '#fff';
    btn.style.color       = active ? '#fff' : 'var(--brown)';
  });
  const ta = document.getElementById('stprompt-' + handle);
  const p = allProducts.find(x=>(x.handle||x.h)===handle);
  if (ta && p) {
    const tax = taxonomyData[handle]||{};
    ta.value = buildStudioPrompt(p.title||p.t||p.tagline||p.tl||'', scene, tax);
  }
}

async function loadStudioImages(handle) {
  try {
    const res = await fetch(AD_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'get_images',handle}) }).then(r=>r.json());
    if (!studioState[handle]) studioState[handle]={scene:'desk',images:[],taglines:[]};
    studioState[handle].images = res.images||[];
    renderStudioImages(handle);
  } catch{}
}

function renderStudioImages(handle) {
  const el = document.getElementById('stimages-' + handle);
  if (!el) return;
  const images = (studioState[handle]||{}).images||[];
  if (!images.length) { el.innerHTML = '<div style="font-size:11px;color:var(--muted);">No images yet — generate one above.</div>'; return; }
  // determine size: main product gets bigger tiles, related row gets compact
  const isMain = !!document.getElementById('stprompt-'+handle);
  const sz = isMain ? 160 : 100;
  el.innerHTML = images.map((img,i) => `
    <div style="display:inline-block;vertical-align:top;">
      <div style="position:relative;width:${sz}px;height:${sz}px;border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer;" onclick="openOverlayModal('${handle}',${i})">
        <img src="${esc(img.url)}" style="width:100%;height:100%;object-fit:cover;">
        <div style="position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;opacity:0;transition:.15s;" onmouseover="this.style.opacity=1;this.style.background='rgba(0,0,0,.35)'" onmouseout="this.style.opacity=0;this.style.background='rgba(0,0,0,0)'">
          <span style="color:#fff;font-size:11px;font-weight:700;">✏️ Add Text</span>
        </div>
      </div>
      <div style="font-size:9px;color:var(--muted);text-align:center;margin-top:2px;">${img.scene_type||''}</div>
      <div style="display:flex;gap:3px;margin-top:3px;justify-content:center;flex-wrap:wrap;">
        <a href="${esc(img.url)}" download="${handle}-${img.id}.png" style="font-size:9px;padding:2px 6px;background:var(--sand);border:1px solid var(--border);border-radius:4px;color:var(--brown);text-decoration:none;">📥</a>
        <button onclick="copyImageToClipboard('${esc(img.url)}',this)" title="Copy image to clipboard — paste in Gemini" style="font-size:9px;padding:2px 6px;background:#f0fdf4;border:1px solid #86efac;border-radius:4px;color:#15803d;cursor:pointer;">📋</button>
        <button onclick="pushImageToShopify('${handle}','${esc(img.url)}',this)" title="Add to Shopify product images" style="font-size:9px;padding:2px 6px;background:#e0f2fe;border:1px solid #7dd3fc;border-radius:4px;color:#0369a1;cursor:pointer;">🛍</button>
        <button onclick="deleteStudioImage('${handle}','${img.id}')" style="font-size:9px;padding:2px 6px;background:#fee2e2;border:1px solid #fca5a5;border-radius:4px;color:#b91c1c;cursor:pointer;">🗑</button>
      </div>
    </div>`).join('');
}

async function copyImageToClipboard(url, btn) {
  const orig = btn.textContent;
  btn.textContent = '⏳';
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    const pngBlob = blob.type === 'image/png' ? blob : await convertToPng(blob);
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': pngBlob })]);
    btn.textContent = '✅';
    toast('✓ Image copied — paste directly in Gemini');
    setTimeout(() => { btn.textContent = orig; }, 2000);
  } catch(e) {
    btn.textContent = orig;
    toast('Copy failed — try downloading instead', true);
  }
}

async function convertToPng(blob) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      canvas.getContext('2d').drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      canvas.toBlob(b => b ? resolve(b) : reject(new Error('canvas toBlob failed')), 'image/png');
    };
    img.onerror = reject;
    img.src = url;
  });
}

function copyStudioPrompt(handle) {
  const text = document.getElementById('stprompt-' + handle)?.value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => toast('✓ Prompt copied — paste in Gemini ImageFX or AI Studio'));
}

async function uploadStudioImage(handle, input) {
  const file = input.files?.[0];
  if (!file) return;
  input.value = '';
  const imgEl = document.getElementById('stimages-' + handle);
  if (imgEl) imgEl.insertAdjacentHTML('afterbegin', '<div id="upload-spinner-'+handle+'" style="font-size:10px;color:var(--muted);">Uploading…</div>');
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const b64 = e.target.result; // data:image/...;base64,...
      const res = await api(AD_URL, { action: 'upload_image', handle, image_b64: b64 });
      const sp = document.getElementById('upload-spinner-' + handle);
      if (sp) sp.remove();
      if (res.ok && res.image) {
        if (!studioState[handle]) studioState[handle] = { scene: 'desk', images: [], taglines: [] };
        studioState[handle].images.push(res.image);
        renderStudioImages(handle);
        toast('✓ Image uploaded');
      } else { toast(res.error || 'Upload failed', true); }
    } catch(err) {
      const sp = document.getElementById('upload-spinner-' + handle);
      if (sp) sp.remove();
      toast('Upload error: ' + err.message, true);
    }
  };
  reader.readAsDataURL(file);
}

async function pushImageToShopify(handle, url, btn) {
  btn.disabled = true; btn.textContent = '⏳';
  try {
    const res = await api(AD_URL, { action: 'push_to_shopify', handle, url });
    if (res.ok) { btn.textContent = '✅'; toast('✓ Added to Shopify product images'); }
    else { btn.textContent = '🛍'; toast(res.error || 'Shopify push failed', true); btn.disabled = false; }
  } catch(e) { btn.textContent = '🛍'; btn.disabled = false; toast('Error: ' + e.message, true); }
}

// ── Text Overlay Modal ──────────────────────────────────
let _overlayHandle = null, _overlayIdx = null;

function openOverlayModal(handle, idx) {
  _overlayHandle = handle; _overlayIdx = idx;
  const img = (studioState[handle]||{}).images?.[idx];
  if (!img) return;
  const p = allProducts.find(x=>(x.handle||x.h)===handle);
  const defaultText = p?.tagline||p?.tl||p?.title||'';

  let modal = document.getElementById('overlay-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'overlay-modal';
    modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;padding:16px;';
    modal.innerHTML = `
      <div style="background:#fff;border-radius:14px;padding:20px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <div style="font-size:13px;font-weight:700;color:var(--brown);">✏️ Add Text Overlay</div>
          <button onclick="closeOverlayModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);">✕</button>
        </div>
        <canvas id="overlay-canvas" style="width:100%;border-radius:8px;border:1px solid var(--border);display:block;"></canvas>
        <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px;">
          <input id="overlay-text" type="text" placeholder="Your tagline or quote…"
            style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;box-sizing:border-box;"
            oninput="redrawOverlay()">
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            <label style="font-size:10px;color:var(--muted);">Position</label>
            <select id="overlay-pos" onchange="redrawOverlay()" style="border:1px solid var(--border);border-radius:6px;padding:3px 6px;font-size:11px;">
              <option value="bottom">Bottom</option>
              <option value="top">Top</option>
              <option value="center">Center</option>
            </select>
            <label style="font-size:10px;color:var(--muted);">Size</label>
            <input id="overlay-size" type="range" min="12" max="48" value="22" oninput="redrawOverlay()" style="width:80px;">
            <label style="font-size:10px;color:var(--muted);">Color</label>
            <input id="overlay-color" type="color" value="#ffffff" oninput="redrawOverlay()" style="width:28px;height:24px;border:none;cursor:pointer;">
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:14px;">
          <button onclick="downloadOverlay()" style="flex:1;background:var(--orange);color:#fff;border:none;border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;">📥 Download with Text</button>
          <button onclick="closeOverlayModal()" style="background:var(--sand);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:12px;cursor:pointer;">Cancel</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  document.getElementById('overlay-text').value = defaultText;
  modal.style.display = 'flex';
  _overlayImage = new Image();
  _overlayImage.crossOrigin = 'anonymous';
  _overlayImage.onload = () => redrawOverlay();
  _overlayImage.src = img.url;
}

let _overlayImage = null;

function redrawOverlay() {
  if (!_overlayImage) return;
  const canvas = document.getElementById('overlay-canvas');
  const text   = document.getElementById('overlay-text')?.value || '';
  const pos    = document.getElementById('overlay-pos')?.value || 'bottom';
  const size   = parseInt(document.getElementById('overlay-size')?.value || '22');
  const color  = document.getElementById('overlay-color')?.value || '#ffffff';
  canvas.width  = _overlayImage.naturalWidth  || 1024;
  canvas.height = _overlayImage.naturalHeight || 1024;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(_overlayImage, 0, 0);
  if (!text) return;
  const w = canvas.width, h = canvas.height;
  // semi-transparent bar
  const barH = size * 2.4;
  const yBar = pos === 'top' ? 0 : pos === 'center' ? h/2 - barH/2 : h - barH;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, yBar, w, barH);
  ctx.fillStyle = color;
  ctx.font = `700 ${size}px Nunito, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, w/2, yBar + barH/2, w - 40);
}

function downloadOverlay() {
  const canvas = document.getElementById('overlay-canvas');
  if (!canvas) return;
  redrawOverlay();
  const handle = _overlayHandle;
  const idx    = _overlayIdx;
  const link = document.createElement('a');
  link.download = `${handle}-overlay-${idx}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function closeOverlayModal() {
  const m = document.getElementById('overlay-modal');
  if (m) m.style.display = 'none';
}

async function generateStudioImage(handle) {
  const p = allProducts.find(x=>(x.handle||x.h)===handle);
  if (!p) return;
  const prompt = document.getElementById('stprompt-'+handle)?.value || '';
  const scene  = (studioState[handle]||{}).scene||'desk';
  const tax    = taxonomyData[handle]||{};
  const btn    = document.querySelector(`[onclick="generateStudioImage('${handle}')"]`);
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner-mini"></span> Generating…'; }
  const imgEl  = document.getElementById('stimages-'+handle);
  if (imgEl) imgEl.innerHTML = '<div style="font-size:11px;color:var(--muted);">Generating… ~15s</div>';
  try {
    const res = await api(AD_URL, { action:'generate_image', handle, quote: p.title||p.t||p.tagline||p.tl||'', scene_type:scene, taxonomy:tax, custom_prompt:prompt });
    if (res.ok && res.image) {
      if (!studioState[handle]) studioState[handle]={scene,images:[],taglines:[]};
      studioState[handle].images.push(res.image);
      renderStudioImages(handle);
      toast('✓ Image generated');
    } else { toast(res.error||'Generation failed', true); }
  } catch(e) { toast('Error: '+e.message, true); }
  finally { if (btn) { btn.disabled=false; btn.innerHTML='✨ Generate Image'; } }
}

async function deleteStudioImage(handle, imageId) {
  await api(AD_URL, {action:'delete_image', handle, image_id: imageId}).catch(()=>{});
  if (studioState[handle]) studioState[handle].images = studioState[handle].images.filter(x=>x.id!==imageId);
  renderStudioImages(handle);
}

async function getStudioTaglines(handle) {
  const p = allProducts.find(x=>(x.handle||x.h)===handle);
  if (!p) return;
  const el = document.getElementById('sttaglines-'+handle);
  if (el) el.innerHTML = '<span style="font-size:10px;color:var(--muted);">Generating taglines…</span>';
  try {
    const res = await api(AD_URL, {action:'generate_taglines', handle, product_title:p.title||handle, quote:p.title||p.t||p.tagline||p.tl||'', taxonomy:taxonomyData[handle]||{}});
    if (res.ok && el) {
      el.innerHTML = (res.taglines||[]).map(tl =>
        `<span onclick="navigator.clipboard.writeText(this.dataset.t);toast('Copied!')" data-t="${esc(tl)}"
          style="background:#fff;border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:10px;cursor:pointer;color:var(--brown);">${esc(tl)}</span>`
      ).join('');
    }
  } catch(e) { if(el) el.innerHTML=''; toast('Tagline error',true); }
}

async function generateForAll(parentHandle) {
  const scene = (studioState[parentHandle]||{}).scene||'desk';
  const relatedHandles = (matchedData[parentHandle]?.related || []);
  if (!relatedHandles.length) { toast('No related products found', true); return; }
  const btn = document.querySelector(`#studio-${parentHandle} .btn-gen-all`);
  if (btn) { btn.disabled=true; btn.textContent='⏳ Generating…'; }
  let done = 0;
  for (const rh of relatedHandles) {
    const rp = allProducts.find(x=>(x.handle||x.h)===rh);
    if (!rp) continue;
    const tax = taxonomyData[rh]||{};
    const quote = rp.title||rp.t||rp.tagline||rp.tl||'';
    const imgEl = document.getElementById('stimages-'+rh);
    if (imgEl) imgEl.innerHTML = '<div style="font-size:10px;color:var(--muted);">Generating…</div>';
    try {
      const res = await api(AD_URL, {action:'generate_image', handle:rh, quote, scene_type:scene, taxonomy:tax});
      if (res.ok && res.image) {
        if (!studioState[rh]) studioState[rh]={scene,images:[],taglines:[]};
        studioState[rh].images.push(res.image);
        renderStudioImages(rh);
        done++;
      } else {
        if (imgEl) imgEl.innerHTML = '<div style="font-size:10px;color:#b91c1c;">Failed</div>';
      }
    } catch(e) {
      if (imgEl) imgEl.innerHTML = '<div style="font-size:10px;color:#b91c1c;">Error</div>';
    }
  }
  if (btn) { btn.disabled=false; btn.textContent='⚡ Generate for All'; }
  toast(`✓ Generated ${done}/${relatedHandles.length} images`);
}

// ── Reload data without full spinner ────────────────────
async function reload() {
  const [catRes, relRes] = await Promise.all([
    api(CATALOG_URL, { action: 'load_approved' }),
    api(RELATE_URL,  { action: 'load' })
  ]);
  allProducts  = (catRes.approved || []).map(p => ({ ...p, handle: p.handle || p.h, title: p.title || p.t }));
  matchedData  = relRes.data || {};
  taxonomyData = relRes.taxonomy || {};
  updateStats();
  render();
}
